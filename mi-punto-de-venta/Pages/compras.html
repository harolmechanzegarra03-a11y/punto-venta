<!DOCTYPE html>
<html>
<head>
    <title>Registrar Compra</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body onload="verificarRol()">
<button onclick="volver()" class="btn-volver">⬅ Volver</button>
<h2>Registrar Compra</h2>

<div class="card">

    <input id="nombre" placeholder="Producto">

    <input id="costo" type="number" step="0.01" placeholder="Costo">

    <input id="precio" type="number" step="0.01" placeholder="Precio venta">

    <input id="cantidad" type="number" placeholder="Cantidad">

    <!-- ✅ NUEVO: IMAGEN -->
    <label>Imagen del producto</label>
    <input type="file" id="imagen" accept="image/*">

    <br><br>

    <!-- IMPORTANTE: type=button -->
    <button type="button" onclick="registrarCompra()">
        Guardar
    </button>

</div>

<script src="../js/db.js"></script>
<script src="../js/permisos.js"></script>
<script src="../js/compras.js"></script>

</body>
</html>
